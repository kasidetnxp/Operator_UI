openapi: 3.1.0
info:
  title: NXP WT FPC Management System API
  description: |
    REST API for the Operator UI — manages FPC transport workflows via AGVs
    between Smart Storage and factory workstations.

    **Phase 1**: No authentication. Employee ID in request body for audit logging.
    **Phase 2**: HttpOnly + Secure session cookie authentication (documented but not yet implemented).
  version: 1.0.0
  contact:
    name: NXP WT Engineering

servers:
  - url: /api/v1
    description: Local / On-prem server

tags:
  - name: Health
    description: System health check
  - name: Machines
    description: Machine management and availability
  - name: FPCs
    description: Front Opening Pod Carrier management
  - name: Tasks
    description: Transport task submission, status, and lifecycle
  - name: Task Confirmations (Frontend)
    description: Screen-based operator confirmations
  - name: Task Confirmations (AGV)
    description: Physical AGV hardware confirmations (NOT called by frontend)
  - name: AGVs
    description: AGV status management
  - name: Audit Logs
    description: System audit log management
  - name: Auth (Phase 2)
    description: "Authentication — Phase 2 (NOT required for current release)"
  - name: Users (Phase 2)
    description: "User management — Phase 2 (admin role only)"

paths:
  # ──────────────────────────────────────────
  # Health
  # ──────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: System is degraded

  # ──────────────────────────────────────────
  # Machines
  # ──────────────────────────────────────────
  /machines:
    get:
      tags: [Machines]
      summary: List all machines with computed state
      operationId: listMachines
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/MachineStatus"
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/MachineState"
        - name: q
          in: query
          schema:
            type: string
          description: Search by machine ID or name
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: List of machines
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Machine"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /machines/{id}:
    get:
      tags: [Machines]
      summary: Get a single machine
      operationId: getMachine
      parameters:
        - $ref: "#/components/parameters/MachineId"
      responses:
        "200":
          description: Machine details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Machine"
        "404":
          $ref: "#/components/responses/NotFound"

  /machines/{id}/availability:
    patch:
      tags: [Machines]
      summary: Update machine availability status
      operationId: updateMachineAvailability
      parameters:
        - $ref: "#/components/parameters/MachineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, status]
              properties:
                employeeId:
                  type: string
                status:
                  $ref: "#/components/schemas/MachineStatus"
                statusComment:
                  type: string
      responses:
        "200":
          description: Updated machine
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Machine"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────
  # FPCs
  # ──────────────────────────────────────────
  /fpcs:
    get:
      tags: [FPCs]
      summary: List all FPCs with optional search and filters
      operationId: listFPCs
      parameters:
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/FPCCategory"
        - name: location
          in: query
          schema:
            type: string
          description: "Filter by location: 'Smart Storage' or machine ID"
        - name: q
          in: query
          schema:
            type: string
          description: Search across address, functionName, label, comment
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: List of FPCs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FPC"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /fpcs/{id}:
    get:
      tags: [FPCs]
      summary: Get a single FPC
      operationId: getFPC
      parameters:
        - $ref: "#/components/parameters/FPCId"
      responses:
        "200":
          description: FPC details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/FPC"
        "404":
          $ref: "#/components/responses/NotFound"

  /fpcs/{id}/comment:
    patch:
      tags: [FPCs]
      summary: Update FPC comment
      operationId: updateFPCComment
      parameters:
        - $ref: "#/components/parameters/FPCId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, comment]
              properties:
                employeeId:
                  type: string
                comment:
                  type: string
      responses:
        "200":
          description: Updated FPC
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/FPC"
        "404":
          $ref: "#/components/responses/NotFound"

  /fpcs/{id}/location:
    patch:
      tags: [FPCs]
      summary: Manually correct FPC location (admin override)
      operationId: updateFPCLocation
      parameters:
        - $ref: "#/components/parameters/FPCId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, newLocation]
              properties:
                employeeId:
                  type: string
                newLocation:
                  type: string
                  description: "'Smart Storage' or machine ID"
                newAddress:
                  type: string
                  description: Required when newLocation is 'Smart Storage'
      responses:
        "200":
          description: Updated FPC
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/FPC"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /fpcs/swap-locations:
    post:
      tags: [FPCs]
      summary: Swap locations of two FPCs (admin override)
      operationId: swapFPCLocations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, fpcId1, fpcId2]
              properties:
                employeeId:
                  type: string
                fpcId1:
                  type: string
                fpcId2:
                  type: string
      responses:
        "200":
          description: Swapped FPC locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      fpc1:
                        $ref: "#/components/schemas/FPCLocationSummary"
                      fpc2:
                        $ref: "#/components/schemas/FPCLocationSummary"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────
  # Tasks
  # ──────────────────────────────────────────
  /tasks:
    post:
      tags: [Tasks]
      summary: Submit a new transport task
      operationId: createTask
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
            format: uuid
          description: UUID v4 to prevent duplicate submissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: Unprocessable entity (e.g., machine unavailable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags: [Tasks]
      summary: List all tasks
      operationId: listTasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: "Comma-separated status filter"
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/TaskType"
        - name: employeeId
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
          description: "true = non-terminal; false = terminal only"
        - name: createdAt[after]
          in: query
          schema:
            type: string
            format: date-time
        - name: createdAt[before]
          in: query
          schema:
            type: string
            format: date-time
        - name: sort
          in: query
          schema:
            type: string
            default: "-createdAt"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get task status (primary polling endpoint)
      description: "Frontend polls this endpoint every 2-3 seconds for active tasks. Stop polling at terminal states."
      operationId: getTask
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"

  /tasks/{id}/cancel:
    post:
      tags: [Tasks]
      summary: Cancel an active task
      operationId: cancelTask
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId]
              properties:
                employeeId:
                  type: string
      responses:
        "200":
          description: Task canceled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ──────────────────────────────────────────
  # Task Confirmations (Frontend)
  # ──────────────────────────────────────────
  /tasks/{id}/confirm-tray-opened:
    post:
      tags: [Task Confirmations (Frontend)]
      summary: Operator confirms tray is opened (screen button)
      description: |
        Called by the frontend when the operator clicks the "Confirm Tray Opened" button on the tablet/monitor.
        This is the ONLY confirmation endpoint the frontend calls. Cover head confirmations are physical AGV buttons.
      operationId: confirmTrayOpened
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, confirmed]
              properties:
                employeeId:
                  type: string
                confirmed:
                  type: boolean
      responses:
        "200":
          description: Task advanced to next step
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ──────────────────────────────────────────
  # Task Confirmations (AGV Hardware)
  # ──────────────────────────────────────────
  /tasks/{id}/confirm-cover-head-installed:
    post:
      tags: [Task Confirmations (AGV)]
      summary: AGV signals cover head installed (physical button)
      description: |
        NOT called by the frontend. Called by the AGV hardware controller when the operator
        presses the physical button on the AGV after installing the cover head.
      operationId: confirmCoverHeadInstalled
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agvId, confirmedAt]
              properties:
                agvId:
                  type: string
                confirmedAt:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Task advanced
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /tasks/{id}/confirm-cover-head-removed:
    post:
      tags: [Task Confirmations (AGV)]
      summary: AGV signals cover head removed (physical button)
      description: |
        NOT called by the frontend. Called by the AGV hardware controller when the operator
        presses the physical button on the AGV after removing the cover head.
      operationId: confirmCoverHeadRemoved
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agvId, confirmedAt]
              properties:
                agvId:
                  type: string
                confirmedAt:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Task advanced
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ──────────────────────────────────────────
  # AGVs
  # ──────────────────────────────────────────
  /agvs:
    get:
      tags: [AGVs]
      summary: List all AGVs
      operationId: listAGVs
      responses:
        "200":
          description: AGV list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AGV"

  /agvs/{id}:
    get:
      tags: [AGVs]
      summary: Get a single AGV
      operationId: getAGV
      parameters:
        - $ref: "#/components/parameters/AGVId"
      responses:
        "200":
          description: AGV details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AGV"
        "404":
          $ref: "#/components/responses/NotFound"

  /agvs/{id}/status:
    patch:
      tags: [AGVs]
      summary: Update AGV status (admin only in Phase 2)
      description: |
        Side effects:
        - non-ok → blocks all active tasks assigned to this AGV
        - ok → resumes all blocked tasks assigned to this AGV
      operationId: updateAGVStatus
      parameters:
        - $ref: "#/components/parameters/AGVId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, status]
              properties:
                employeeId:
                  type: string
                status:
                  $ref: "#/components/schemas/AGVStatusEnum"
      responses:
        "200":
          description: Updated AGV
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AGV"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────
  # Audit Logs
  # ──────────────────────────────────────────
  /audit-logs:
    get:
      tags: [Audit Logs]
      summary: List audit logs
      operationId: listAuditLogs
      parameters:
        - name: eventType
          in: query
          schema:
            type: string
          description: Comma-separated event type filter
        - name: employeeId
          in: query
          schema:
            type: string
        - name: timestamp[after]
          in: query
          schema:
            type: string
            format: date-time
        - name: timestamp[before]
          in: query
          schema:
            type: string
            format: date-time
        - name: sort
          in: query
          schema:
            type: string
            default: "-timestamp"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLog"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
    delete:
      tags: [Audit Logs]
      summary: Clear all audit logs
      operationId: clearAuditLogs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId]
              properties:
                employeeId:
                  type: string
      responses:
        "204":
          description: Logs cleared

  # ──────────────────────────────────────────
  # Auth (Phase 2)
  # ──────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth (Phase 2)]
      summary: "[Phase 2] Login with employee credentials"
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, password]
              properties:
                employeeId:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful (sets HttpOnly session cookie)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserSession"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      tags: [Auth (Phase 2)]
      summary: "[Phase 2] Logout and clear session"
      operationId: logout
      responses:
        "204":
          description: Session cleared

  /auth/me:
    get:
      tags: [Auth (Phase 2)]
      summary: "[Phase 2] Get current authenticated user"
      operationId: getCurrentUser
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserSession"
        "401":
          description: No active session

  # ──────────────────────────────────────────
  # Users (Phase 2)
  # ──────────────────────────────────────────
  /users:
    get:
      tags: [Users (Phase 2)]
      summary: "[Phase 2] List all users (admin only)"
      operationId: listUsers
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
    post:
      tags: [Users (Phase 2)]
      summary: "[Phase 2] Create user (admin only)"
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, password, role]
              properties:
                employeeId:
                  type: string
                password:
                  type: string
                  format: password
                role:
                  $ref: "#/components/schemas/UserRole"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/{employeeId}:
    patch:
      tags: [Users (Phase 2)]
      summary: "[Phase 2] Update user (admin only)"
      operationId: updateUser
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  format: password
                role:
                  $ref: "#/components/schemas/UserRole"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [Users (Phase 2)]
      summary: "[Phase 2] Delete user (admin only)"
      operationId: deleteUser
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: User deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

# ════════════════════════════════════════════
# Components
# ════════════════════════════════════════════
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PerPage:
      name: perPage
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    MachineId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Machine ID (e.g., AVT_001)
    FPCId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: FPC ID (e.g., 2ID021FV002B)
    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Task ID (e.g., TASK-1720000000000)
    AGVId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: AGV ID (e.g., AGV-01)

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict (duplicate, state violation)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ── Pagination ──
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        perPage:
          type: integer
        totalPages:
          type: integer

    # ── Error ──
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
                  code:
                    type: string

    # ── Health ──
    HealthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status:
              type: string
              enum: [healthy, degraded]
            version:
              type: string
            timestamp:
              type: string
              format: date-time
            services:
              type: object
              properties:
                database:
                  type: string
                agvController:
                  type: string
                smartStorage:
                  type: string

    # ── Machine ──
    MachineStatus:
      type: string
      enum: [available, engineering_use, breakdown, pm, other]

    MachineState:
      type: string
      enum: [empty, occupied, reserved, unavailable]

    Machine:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          $ref: "#/components/schemas/MachineStatus"
        statusComment:
          type: string
          nullable: true
        state:
          $ref: "#/components/schemas/MachineState"
        fpcId:
          type: string
          nullable: true

    # ── FPC ──
    FPCCategory:
      type: string
      enum: [Storage, Service, Deposit PM, Deposit Production]

    FPC:
      type: object
      properties:
        id:
          type: string
        address:
          type: string
        functionName:
          type: string
        label:
          type: string
        comment:
          type: string
          nullable: true
        category:
          $ref: "#/components/schemas/FPCCategory"
        location:
          type: string

    FPCLocationSummary:
      type: object
      properties:
        id:
          type: string
        location:
          type: string
        address:
          type: string

    # ── Task ──
    TaskType:
      type: string
      enum: [return, request, move, unload_load]

    TaskStatus:
      type: string
      enum:
        - submitted
        - queued
        - starting
        - moving_to_source
        - arrived_at_source
        - waiting_tray_open
        - picking_up_fpc
        - waiting_cover_head_install
        - moving_to_destination
        - arrived_at_destination
        - placing_fpc
        - waiting_cover_head_remove
        - completed
        - rejected
        - blocked
        - failed
        - canceled
        - error

    Task:
      type: object
      properties:
        taskId:
          type: string
        jobId:
          type: string
        type:
          $ref: "#/components/schemas/TaskType"
        status:
          $ref: "#/components/schemas/TaskStatus"
        employeeId:
          type: string
        sourceMachine:
          type: string
          nullable: true
        destinationMachine:
          type: string
          nullable: true
        fpcId:
          type: string
          nullable: true
        agvId:
          type: string
          nullable: true
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        isOccupiedMove:
          type: boolean
        oldFpcId:
          type: string
          nullable: true
        trayOpenedConfirmed:
          type: boolean
        coverHeadPhysicalConfirmed:
          type: boolean
        currentStepIndex:
          type: integer
          nullable: true
        queuePosition:
          type: integer
          nullable: true

    CreateTaskRequest:
      type: object
      required: [employeeId, type]
      properties:
        employeeId:
          type: string
        type:
          $ref: "#/components/schemas/TaskType"
        sourceMachineId:
          type: string
          description: Required for type=return, type=move
        destinationMachineId:
          type: string
          description: Required for type=request, type=move, type=unload_load
        fpcId:
          type: string
          description: Required for type=request, type=unload_load
      discriminator:
        propertyName: type

    # ── AGV ──
    AGVStatusEnum:
      type: string
      enum: [ok, engineering_use, pm, error]

    AGV:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        number:
          type: integer
        status:
          $ref: "#/components/schemas/AGVStatusEnum"

    # ── Audit Log ──
    AuditLogEventType:
      type: string
      enum: [LOGIN, LOGOUT, TASK_SUBMIT, STATE_CHANGE, CONFIRMATION, CANCEL, SYSTEM]

    AuditLog:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        eventType:
          $ref: "#/components/schemas/AuditLogEventType"
        employeeId:
          type: string
        message:
          type: string

    # ── User (Phase 2) ──
    UserRole:
      type: string
      enum: [admin, store, operator]

    User:
      type: object
      properties:
        employeeId:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserSession:
      type: object
      properties:
        employeeId:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
